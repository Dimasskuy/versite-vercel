<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DimasAjaa | Home</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <button id="share-button" aria-label="Share page" onclick="sharePage()">
        <i data-feather="share-2"></i>
    </button>

    <button id="theme-toggle" aria-label="Toggle theme" onclick="toggleTheme()">
        <i data-feather="sun" class="feather-sun"></i>
        <i data-feather="moon" class="feather-moon"></i>
    </button>

    <div id="content-wrapper">
        <div id="clock-container">
            <div id="time">00:00:00</div>
            <div id="date">Monday, 1 January 2024</div>
        </div>

        <main id="container">
            <div id="profile">
                <img src="https://i.ibb.co.com/7xfZyYpS/IMG-20260310-094735-1.jpg" alt="Profil">
            </div>

            <h1 id="name">DimasAjaa</h1>

            <a class="link-container" href="https://whatsapp.com/channel/0029VaCvaNgBPzjcfrTixA1U" target="_blank">
                <i class="link-logo" data-feather="message-circle"></i>
                WhatsApp Channel
            </a>

            <a class="link-container" href="https://chat.whatsapp.com/DXPU5F2cePXEaysvcImdUy" target="_blank">
                <i class="link-logo" data-feather="users"></i>
                Group Bot Whatsapp
            </a>

            <a class="link-container" href="https://chat.botika.online/7IIQJKO" target="_blank">
                <i class="link-logo" data-feather="cpu"></i>
                Chat Ai
            </a>

            <div id="social-grid">
                <a class="social-item" href="https://wa.me/6282257529886" target="_blank" title="WhatsApp">
                    <i data-feather="message-square"></i>
                </a>
                <a class="social-item" href="https://github.com/dimasskuy" target="_blank" title="GitHub">
                    <i data-feather="github"></i>
                </a>
                <a class="social-item" href="https://youtube.com/@felizmunzz?si=mvpddUdPc9TudwfP" target="_blank" title="YouTube">
                    <i data-feather="youtube"></i>
                </a>
                <a class="social-item" href="https://replit.com/@dimaszkuy" target="_blank" title="Replit">
                    <i data-feather="terminal"></i>
                </a>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script>
        // Initialize Feather Icons
        feather.replace();

        // Clock Function
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');

            const timeEl = document.getElementById('time');
            if (timeEl) timeEl.textContent = `${hours}:${minutes}:${seconds}`;

            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const dateEl = document.getElementById('date');
            if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Theme Toggle
        function toggleTheme() {
            const html = document.documentElement;
            const newTheme = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        const storedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', storedTheme);

        // Share Function
        function sharePage() {
            const shareData = {
                title: document.title,
                text: 'Kunjungi Info Dimass untuk link menarik!',
                url: window.location.href,
            };

            if (navigator.share) {
                navigator.share(shareData).catch(console.error);
            } else {
                const shareMessage = `${shareData.text}\n${shareData.url}`;
                navigator.clipboard.writeText(shareMessage)
                    .then(() => alert('Link telah disalin ke clipboard!'))
                    .catch(() => alert('Gagal menyalin link.'));
            }
        }
    </script>
</body>
</html>
